          example: "25%"
        savedAmount:
          type: number
          default: 0
          example: 250
        remaining:
          type: number
          description: Montant restant à atteindre (calculé automatiquement : amount - savedAmount)
          example: 750
    CreationTransaction:
      type: object
      properties:
        date:
          type: string
          format: date-time
        labels:
          type: array
          items:
            $ref: "#/components/schemas/Label"
        type:
          type: string
          enum:
            - IN
            - OUT
        description:
          type: string
        amount:
          type: number
          format: double
        walletId:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        goalId:
          type: string
          format: uuid
    Transaction:
      allOf:
        - $ref: "#/components/schemas/CreationTransaction"
      type: object
      properties:
        id:
          type: string
          format: uuid
    WalletAutomaticIncome:
      type: object
      properties:
        type:
          type: string
          enum:
            - NOT_SPECIFIED
            - MENSUAL
        amount:
          type: number
